<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Globe horizontal line (equator) -->
  <ellipse cx="50" cy="50" rx="20" ry="8" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  
  <!-- Globe vertical line (meridian) -->
  <ellipse cx="50" cy="50" rx="8" ry="20" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  
  <!-- Arrow Top -->
  <line x1="50" y1="25" x2="50" y2="8" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="44,14 50,8 56,14" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Bottom -->
  <line x1="50" y1="75" x2="50" y2="92" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="44,86 50,92 56,86" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Right -->
  <line x1="75" y1="50" x2="92" y2="50" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="86,44 92,50 86,56" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Left -->
  <line x1="25" y1="50" x2="8" y2="50" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="14,44 8,50 14,56" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Top-Right -->
  <line x1="67" y1="33" x2="80" y2="20" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="74,20 80,20 80,26" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Top-Left -->
  <line x1="33" y1="33" x2="20" y2="20" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="20,26 20,20 26,20" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Bottom-Right -->
  <line x1="67" y1="67" x2="80" y2="80" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="80,74 80,80 74,80" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Bottom-Left -->
  <line x1="33" y1="67" x2="20" y2="80" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="26,80 20,80 20,74" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
